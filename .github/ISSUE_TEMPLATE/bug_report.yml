name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal code to reproduce the issue.
      render: python
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
  - type: input
    id: version
    attributes:
      label: NanoIndex version
      placeholder: "0.4.0"
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12"
  - type: dropdown
    id: parser
    attributes:
      label: Parser
      options:
        - nanonets (default)
        - pymupdf
        - other
