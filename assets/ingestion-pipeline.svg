<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" font-family="system-ui, -apple-system, sans-serif">
  <rect width="880" height="480" fill="#ffffff" rx="12"/>

  <!-- Title -->
  <text x="440" y="35" fill="#1a1a1a" font-size="15" font-weight="bold" text-anchor="middle">Ingestion Pipeline</text>
  <text x="440" y="52" fill="#999" font-size="11" text-anchor="middle">nanoindex.index("report.pdf")</text>

  <!-- Step 1: PDF -->
  <rect x="355" y="68" width="170" height="48" rx="10" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1.2"/>
  <text x="440" y="97" fill="#555" font-size="13" font-weight="600" text-anchor="middle">Your PDF</text>

  <!-- Arrow -->
  <line x1="440" y1="116" x2="440" y2="140" stroke="#ccc" stroke-width="1.5"/>
  <polygon points="436,140 440,149 444,140" fill="#ccc"/>

  <!-- Step 2: Nanonets OCR-3 -->
  <rect x="310" y="150" width="260" height="52" rx="10" fill="#546FFF0D" stroke="#546FFF" stroke-width="1.5"/>
  <text x="440" y="175" fill="#546FFF" font-size="14" font-weight="bold" text-anchor="middle">Nanonets OCR-3</text>
  <text x="440" y="191" fill="#999" font-size="10" text-anchor="middle">1 API call  ·  $0.01/page</text>

  <!-- Arrow -->
  <line x1="440" y1="202" x2="440" y2="222" stroke="#ccc" stroke-width="1.5"/>
  <polygon points="436,222 440,231 444,222" fill="#ccc"/>

  <!-- Output pills -->
  <rect x="82" y="232" width="80" height="22" rx="11" fill="#546FFF10" stroke="#546FFF40" stroke-width="1"/>
  <text x="122" y="247" fill="#546FFF" font-size="10" text-anchor="middle">Markdown</text>

  <rect x="176" y="232" width="78" height="22" rx="11" fill="#546FFF10" stroke="#546FFF40" stroke-width="1"/>
  <text x="215" y="247" fill="#546FFF" font-size="10" text-anchor="middle">Hierarchy</text>

  <rect x="268" y="232" width="62" height="22" rx="11" fill="#546FFF10" stroke="#546FFF40" stroke-width="1"/>
  <text x="299" y="247" fill="#546FFF" font-size="10" text-anchor="middle">Tables</text>

  <rect x="344" y="232" width="110" height="22" rx="11" fill="#546FFF10" stroke="#546FFF40" stroke-width="1"/>
  <text x="399" y="247" fill="#546FFF" font-size="10" text-anchor="middle">Bounding Boxes</text>

  <rect x="468" y="232" width="96" height="22" rx="11" fill="#546FFF10" stroke="#546FFF40" stroke-width="1"/>
  <text x="516" y="247" fill="#546FFF" font-size="10" text-anchor="middle">Page Layouts</text>

  <rect x="578" y="232" width="62" height="22" rx="11" fill="#546FFF10" stroke="#546FFF40" stroke-width="1"/>
  <text x="609" y="247" fill="#546FFF" font-size="10" text-anchor="middle">Images</text>

  <rect x="654" y="232" width="100" height="22" rx="11" fill="#546FFF10" stroke="#546FFF40" stroke-width="1"/>
  <text x="704" y="247" fill="#546FFF" font-size="10" text-anchor="middle">TOC Detection</text>

  <!-- Arrow -->
  <line x1="440" y1="258" x2="440" y2="278" stroke="#ccc" stroke-width="1.5"/>
  <polygon points="436,278 440,287 444,278" fill="#ccc"/>

  <!-- Step 3: Tree Builder -->
  <rect x="310" y="288" width="260" height="52" rx="10" fill="#20C9970D" stroke="#20C997" stroke-width="1.5"/>
  <text x="440" y="313" fill="#20C997" font-size="14" font-weight="bold" text-anchor="middle">Tree Builder</text>
  <text x="440" y="329" fill="#999" font-size="10" text-anchor="middle">Deterministic  ·  Zero LLM calls  ·  Free</text>

  <!-- Three arrows fanning out -->
  <line x1="370" y1="340" x2="165" y2="378" stroke="#ccc" stroke-width="1.2"/>
  <polygon points="162,374 160,384 168,378" fill="#ccc"/>

  <line x1="440" y1="340" x2="440" y2="378" stroke="#ccc" stroke-width="1.2"/>
  <polygon points="436,378 440,387 444,378" fill="#ccc"/>

  <line x1="510" y1="340" x2="715" y2="378" stroke="#ccc" stroke-width="1.2"/>
  <polygon points="712,374 720,378 718,384" fill="#ccc"/>

  <!-- Step labels above boxes -->
  <text x="165" y="373" fill="#7B8FFF" font-size="9" text-anchor="middle">+ LLM summaries</text>
  <text x="440" y="373" fill="#9775FA" font-size="9" text-anchor="middle">+ LLM entity extraction</text>
  <text x="715" y="373" fill="#FCC419" font-size="9" text-anchor="middle">Local model, no API key</text>

  <!-- Step 4a: Document Tree -->
  <rect x="60" y="388" width="210" height="50" rx="10" fill="#7B8FFF0D" stroke="#7B8FFF" stroke-width="1.3"/>
  <text x="165" y="410" fill="#546FFF" font-size="12" font-weight="bold" text-anchor="middle">Document Tree</text>
  <text x="165" y="426" fill="#999" font-size="10" text-anchor="middle">Sections, headings, pages</text>

  <!-- Step 4b: Entity Graph -->
  <rect x="335" y="388" width="210" height="50" rx="10" fill="#9775FA0D" stroke="#9775FA" stroke-width="1.3"/>
  <text x="440" y="410" fill="#7950F2" font-size="12" font-weight="bold" text-anchor="middle">Entity Graph</text>
  <text x="440" y="426" fill="#999" font-size="10" text-anchor="middle">Companies, metrics, dates</text>

  <!-- Step 4c: Embeddings -->
  <rect x="610" y="388" width="210" height="50" rx="10" fill="#FCC4190D" stroke="#FCC419" stroke-width="1.3"/>
  <text x="715" y="410" fill="#E8A800" font-size="12" font-weight="bold" text-anchor="middle">Embeddings</text>
  <text x="715" y="426" fill="#999" font-size="10" text-anchor="middle">Node summary vectors</text>

  <!-- Footer -->
  <text x="440" y="465" fill="#20C997" font-size="11" font-weight="bold" text-anchor="middle">All built automatically by nanoindex.index()</text>
</svg>
