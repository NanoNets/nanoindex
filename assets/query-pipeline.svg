<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" font-family="system-ui, -apple-system, sans-serif">
  <rect width="880" height="440" fill="#ffffff" rx="12"/>

  <!-- Title -->
  <text x="440" y="35" fill="#1a1a1a" font-size="15" font-weight="bold" text-anchor="middle">Query Pipeline</text>
  <text x="440" y="52" fill="#999" font-size="11" text-anchor="middle">nanoindex.ask("What was the revenue?", tree)</text>

  <!-- Step 1: Question -->
  <rect x="50" y="80" width="155" height="48" rx="10" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1.2"/>
  <text x="127" y="109" fill="#555" font-size="13" font-weight="600" text-anchor="middle">Your Question</text>

  <!-- Arrow -->
  <line x1="205" y1="104" x2="245" y2="104" stroke="#ccc" stroke-width="1.5"/>
  <polygon points="245,100 254,104 245,108" fill="#ccc"/>

  <!-- Step 2: Embed Query -->
  <rect x="255" y="80" width="190" height="48" rx="10" fill="#FCC4190D" stroke="#FCC419" stroke-width="1.5"/>
  <text x="350" y="101" fill="#E8A800" font-size="13" font-weight="bold" text-anchor="middle">Embed Query</text>
  <text x="350" y="117" fill="#999" font-size="10" text-anchor="middle">Local model, instant</text>

  <!-- Cost label -->
  <rect x="455" y="90" width="85" height="20" rx="10" fill="#20C99715"/>
  <text x="497" y="104" fill="#20C997" font-size="9" font-weight="600" text-anchor="middle">0 LLM calls</text>

  <!-- Arrow down -->
  <line x1="350" y1="128" x2="350" y2="158" stroke="#ccc" stroke-width="1.5"/>
  <polygon points="346,158 350,167 354,158" fill="#ccc"/>

  <!-- Step 3: Cosine Search -->
  <rect x="255" y="168" width="190" height="48" rx="10" fill="#FCC4190D" stroke="#FCC419" stroke-width="1.5"/>
  <text x="350" y="189" fill="#E8A800" font-size="13" font-weight="bold" text-anchor="middle">Cosine Search</text>
  <text x="350" y="205" fill="#999" font-size="10" text-anchor="middle">Top 20 candidate nodes</text>

  <!-- Arrow right to graph -->
  <line x1="445" y1="192" x2="540" y2="192" stroke="#ccc" stroke-width="1.2"/>
  <polygon points="540,188 549,192 540,196" fill="#ccc"/>

  <!-- Step 3b: Graph Expand -->
  <rect x="550" y="168" width="190" height="48" rx="10" fill="#9775FA0D" stroke="#9775FA" stroke-width="1.5"/>
  <text x="645" y="189" fill="#7950F2" font-size="13" font-weight="bold" text-anchor="middle">Graph Expand</text>
  <text x="645" y="205" fill="#999" font-size="10" text-anchor="middle">Find related sections</text>

  <!-- Cost label -->
  <rect x="750" y="178" width="85" height="20" rx="10" fill="#20C99715"/>
  <text x="792" y="192" fill="#20C997" font-size="9" font-weight="600" text-anchor="middle">0 LLM calls</text>

  <!-- Arrow down -->
  <line x1="350" y1="216" x2="350" y2="256" stroke="#ccc" stroke-width="1.5"/>
  <polygon points="346,256 350,265 354,256" fill="#ccc"/>

  <!-- Step 4: LLM Selection -->
  <rect x="255" y="266" width="190" height="48" rx="10" fill="#FF6B6B0D" stroke="#FF6B6B" stroke-width="1.5"/>
  <text x="350" y="287" fill="#FF6B6B" font-size="13" font-weight="bold" text-anchor="middle">LLM Selection</text>
  <text x="350" y="303" fill="#999" font-size="10" text-anchor="middle">Picks ~10 from ~25 candidates</text>

  <!-- Cost label -->
  <rect x="455" y="276" width="105" height="20" rx="10" fill="#FF6B6B15"/>
  <text x="507" y="290" fill="#FF6B6B" font-size="9" font-weight="600" text-anchor="middle">1 small LLM call</text>

  <!-- Arrow down -->
  <line x1="350" y1="314" x2="350" y2="348" stroke="#ccc" stroke-width="1.5"/>
  <polygon points="346,348 350,357 354,348" fill="#ccc"/>

  <!-- Step 5: Answer -->
  <rect x="240" y="358" width="220" height="48" rx="10" fill="#20C9970D" stroke="#20C997" stroke-width="1.5"/>
  <text x="350" y="379" fill="#20C997" font-size="13" font-weight="bold" text-anchor="middle">Answer + Citations</text>
  <text x="350" y="395" fill="#999" font-size="10" text-anchor="middle">1 LLM call</text>

  <!-- Arrow right -->
  <line x1="460" y1="382" x2="530" y2="382" stroke="#ccc" stroke-width="1.5"/>
  <polygon points="530,378 539,382 530,386" fill="#ccc"/>

  <!-- Output -->
  <rect x="540" y="358" width="260" height="48" rx="10" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1.2"/>
  <text x="670" y="379" fill="#1a1a1a" font-size="12" font-weight="bold" text-anchor="middle">Cited answer</text>
  <text x="670" y="395" fill="#999" font-size="10" text-anchor="middle">with page numbers and bounding boxes</text>

  <!-- Footer -->
  <text x="440" y="430" fill="#546FFF" font-size="11" font-weight="bold" text-anchor="middle">Total: 2 LLM calls  ·  3x cheaper than full tree scan</text>
</svg>
